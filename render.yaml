services:
  - type: web
    name: adq-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && REACT_APP_API_URL=/api/v1 npm run build
      python backend/init_db.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: main
    repo: https://github.com/Alool266/-adq-website.git
    rootDir: backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
