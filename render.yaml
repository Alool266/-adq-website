services:
  - type: web
    name: adq-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/init_db.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    branch: main
    repo: https://github.com/Alool266/-adq-website.git
    rootDir: .
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        value: https://kepyyudsrfhofseownnj.supabase.co
      - key: SUPABASE_PASSWORD
        value: YOUR_SUPABASE_PASSWORD
        # Set this in Render dashboard - don't commit passwords!
    disk:
      name: backend-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  - type: web
    name: adq-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/build
    branch: main
    repo: https://github.com/Alool266/-adq-website.git
    rootDir: .
    envVars:
      - key: REACT_APP_API_URL
        value: https://adq-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
