services:
  - type: web
    name: adq-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/init_db.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: main
    repo: https://github.com/Alool266/-adq-website.git
    envVars:
      - key: SECRET_KEY
        generateValue: true
