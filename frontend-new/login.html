<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADQ Admin - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: #fff; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    h1 { color: #1a1a2e; margin-bottom: 10px; text-align: center; }
    p { color: #666; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
    input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
    input:focus { outline: none; border-color: #1a1a2e; }
    .error { color: #e74c3c; margin-bottom: 15px; display: none; }
    button { width: 100%; padding: 15px; background: #1a1a2e; color: #fff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
    button:hover { background: #16213e; }
    button:disabled { background: #999; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>ADQ Admin</h1>
    <p>Sign in to manage your website</p>
    <div class="error" id="error">Invalid username or password</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
  </div>
  <script>
    const API_URL = '/api/v1';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const error = document.getElementById('error');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      error.style.display = 'none';
      
      try {
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);
        
        const res = await fetch(API_URL + '/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        });
        
        if (!res.ok) throw new Error('Login failed');
        
        const data = await res.json();
        localStorage.setItem('admin_token', data.access_token);
        window.location.href = '/dashboard.html';
      } catch (err) {
        error.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
